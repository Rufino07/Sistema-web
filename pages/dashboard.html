<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Sistema de Gestión</title>
    <link rel="stylesheet" href="../css/brutalist.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <div class="dashboard">
        
        <!-- Sidebar -->
        <div class="sidebar" id="sidebar"></div>

        <!-- Contenido principal -->
        <div class="main-content">

            <!-- Botón Cerrar Sesión -->
            <div style="text-align: right; padding: 20px;">
                <button onclick="Auth.cerrarSesion()" 
                        class="brutal-button soft-mauve">
                    CERRAR SESIÓN
                </button>
            </div>

            <div id="contenidoPrincipal"></div>
        </div>
    </div>

    <!-- Modales -->
    <div class="modal" id="modalPrincipal"></div>

    <!-- Scripts -->
    <script src="../js/main.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/dashboard.js"></script>
    <script src="../js/products.js"></script>
    <script src="../js/sales.js"></script>
    <script src="../js/suppliers.js"></script>
    <script src="../js/stats.js"></script>
</body>
</html>
