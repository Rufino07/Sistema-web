<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papelería - Sistema de Gestión</title>
    <link rel="stylesheet" href="css/brutalist.css">
    <style>
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--text-dark);
            color: var(--cream);
            text-align: center;
            border: 8px solid var(--soft-purple);
        }
        .hero-content {
            max-width: 800px;
            padding: 40px;
            border: 4px solid var(--cream);
        }
        h1 {
            font-size: 5em;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 20px;
            letter-spacing: -2px;
        }
        .hero-button {
            background: var(--soft-purple);
            color: var(--text-dark);
            border: 4px solid var(--cream);
            padding: 20px 40px;
            font-size: 1.5em;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.1s linear;
            margin-top: 30px;
        }
        .hero-button:hover {
            background: var(--cream);
            color: var(--text-dark);
            border-color: var(--soft-purple);
            transform: translate(4px, 4px);
        }
    </style>
</head>
<body>
    <div class="hero">
        <div class="hero-content">
            <h1>PAPELERÍA<br>SISTEMA DE GESTIÓN</h1>
            <p style="font-size: 1.5em; margin: 30px 0; font-weight: 300;">
                Administración de inventario, ventas y proveedores
            </p>
            <button class="hero-button" onclick="window.location.href='pages/login.html'">
                ACCEDER AL PANEL
            </button>
        </div>
    </div>
</body>
</html>
